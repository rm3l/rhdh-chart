name: PR TOML Validator

on:
  push:
    paths:
      - '**.toml'
      - '.github/workflows/toml-checks.yaml'
  pull_request:
    paths:
      - '**.toml'
      - '.github/workflows/toml-checks.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: tombi-toml/setup-tombi@af12994358821d8b3dc91a00288a9360606e545d # v1.1.3
        with:
          version: 'v0.9.9'
          checksum: 'b50dbc90ec27591dbaf564b628bd3b3e4ead371a60931bc8ea5f34d7cd1d3607'
      - name: Validate TOML files
        run: tombi lint

name: PR TOML Validator

on:
  push:
    paths:
      - '**.toml'
      - '.github/workflows/toml-checks.yaml'
  pull_request:
    paths:
      - '**.toml'
      - '.github/workflows/toml-checks.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: tombi-toml/setup-tombi@df24458044353545055a12fe0d0742df9d3c5bea # v1.1.2
        with:
          version: 'v0.9.9'
          checksum: 'b50dbc90ec27591dbaf564b628bd3b3e4ead371a60931bc8ea5f34d7cd1d3607'
      - name: Validate TOML files
        run: tombi lint

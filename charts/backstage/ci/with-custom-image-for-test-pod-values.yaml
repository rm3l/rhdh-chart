# Workaround for kind cluster in CI which has no Routes and no PVCs
route:
  enabled: false

# CI: skip dynamic plugin downloads to speed up tests.
global:
  dynamic:
    includes: []
  lightspeed:
    plugins: []

upstream:
  postgresql:
    primary:
      persistence:
        enabled: false

test:
  image:
    registry: quay.io
    repository: curl/curl-base
    tag: 8.11.1

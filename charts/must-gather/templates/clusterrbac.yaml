{{- if and .Values.rbac.create (eq .Values.rbac.scope "cluster") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log", "services", "endpoints", "configmaps", "events", "persistentvolumeclaims", "serviceaccounts", "replicationcontrollers", "resourcequotas", "limitranges"]
    verbs: ["get", "list"]
  {{- if or .Values.gather.withSecrets .Values.gather.withHelm }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  {{- end }}
  - apiGroups: [""]
    resources: ["namespaces", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  {{- if .Values.rbac.rules.platform }}
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions", "infrastructures"]
    verbs: ["get", "list"]
  {{- end }}
  {{- if .Values.rbac.rules.ingresses }}
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies", "ingressclasses"]
    verbs: ["get", "list"]
  {{- end }}
  {{- if .Values.rbac.rules.routes }}
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  {{- end }}
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  {{- if .Values.rbac.rules.backstages }}
  - apiGroups: ["rhdh.redhat.com"]
    resources: ["backstages"]
    verbs: ["get", "list"]
  {{- end }}
  {{- if .Values.rbac.rules.olm }}
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions", "clusterserviceversions", "installplans", "catalogsources", "operatorgroups"]
    verbs: ["get", "list"]
  {{- end }}
  - apiGroups: [""]
    resources: ["pods/exec"] # NOSONAR - required for data collection
    verbs: ["create"]
  {{- if .Values.gather.withHeapDumps }}
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  {{- end }}
  {{- if .Values.rbac.rules.sonataflow }}
  - apiGroups: ["sonataflow.org"]
    resources: ["sonataflowplatforms", "sonataflows", "sonataflowbuilds", "sonataflowclusterplatforms"]
    verbs: ["get", "list"]
  {{- end }}
  {{- if .Values.rbac.rules.knative }}
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings", "knativeeventings"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.serverless.openshift.io"]
    resources: ["knativekafkas"]
    verbs: ["get", "list"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rhdh-must-gather.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rhdh-must-gather.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["apps", "extensions"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["rhdh.redhat.com"]
    resources: ["*"]
    verbs: ["get", "list"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list"]
  # Orchestrator-related permissions
  - apiGroups: ["sonataflow.org"]
    resources: ["sonataflowplatforms", "sonataflows", "sonataflowclusterplatforms", "sonataflowbuilds"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings", "knativeeventings"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.serverless.openshift.io"]
    resources: ["knativekafkas"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rhdh-must-gather.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rhdh-must-gather.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

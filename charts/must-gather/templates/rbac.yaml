{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "secrets", "events", "persistentvolumeclaims", "serviceaccounts", "namespaces", "nodes", "replicationcontrollers", "resourcequotas", "limitranges"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies", "ingressclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "volumeattachments"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["rhdh.redhat.com"]
    resources: ["backstages"]
    verbs: ["get", "list"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions", "clusterserviceversions", "installplans", "catalogsources", "operatorgroups"]
    verbs: ["get", "list"]
  # Orchestrator-related permissions
  - apiGroups: ["sonataflow.org"]
    resources: ["sonataflowplatforms", "sonataflows", "sonataflowclusterplatforms", "sonataflowbuilds"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.knative.dev"]
    resources: ["knativeservings", "knativeeventings"]
    verbs: ["get", "list"]
  - apiGroups: ["operator.serverless.openshift.io"]
    resources: ["knativekafkas"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rhdh-must-gather.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "rhdh-must-gather.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.test.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}-test
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-2"
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}-test
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-1"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"] # NOSONAR - exec is required to retrieve must-gather output from the data-holder container during helm test
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}-test
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "rhdh-must-gather.fullname" . }}-test
subjects:
  - kind: ServiceAccount
    name: {{ include "rhdh-must-gather.fullname" . }}-test
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "rhdh-must-gather.fullname" . }}-test
  labels:
    {{- include "rhdh-must-gather.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  serviceAccountName: {{ include "rhdh-must-gather.fullname" . }}-test
  automountServiceAccountToken: false
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: test
      image: {{ include "rhdh-must-gather.image" (dict "image" .Values.test.image "defaultTag" "latest") | quote }} # NOSONAR
      {{- with .Values.test.image.pullPolicy }}
      imagePullPolicy: {{ . }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumeMounts:
        - name: kube-api-access
          mountPath: /var/run/secrets/kubernetes.io/serviceaccount
          readOnly: true
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: DEPLOY_NAME
          value: {{ include "rhdh-must-gather.fullname" . }}
        - name: POD_SELECTOR
          value: "app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=gather"
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          echo "Step 1: Waiting for the gather pod to be ready (init container completed)..."
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod -l "$POD_SELECTOR" --timeout=3600s

          echo "Step 2: Retrieving gathered data from the data-holder container..."
          kubectl -n "$NAMESPACE" exec "deploy/$DEPLOY_NAME" -c data-holder -- tar czf - -C /must-gather . > /tmp/rhdh-must-gather-output.tar.gz

          size=$(stat -c%s /tmp/rhdh-must-gather-output.tar.gz 2>/dev/null || stat -f%z /tmp/rhdh-must-gather-output.tar.gz 2>/dev/null)
          file_count=$(tar -tzf /tmp/rhdh-must-gather-output.tar.gz | wc -l)
          if [ "$size" -le 0 ] 2>/dev/null || [ "$file_count" -eq 0 ]; then
            echo "FAIL: retrieved archive is empty or contains no files"
            exit 1
          fi
          echo "PASS: gathered data retrieved successfully (${size} bytes)"
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
          ephemeral-storage: "32Mi"
        limits:
          memory: "128Mi"
          cpu: "100m"
          ephemeral-storage: "64Mi"
  volumes:
    - name: kube-api-access
      projected:
        defaultMode: 0444
        sources:
          - serviceAccountToken:
              expirationSeconds: {{ .Values.serviceAccount.tokenExpirationSeconds }}
              path: token
          - configMap:
              name: kube-root-ca.crt
              items:
                - key: ca.crt
                  path: ca.crt
          - downwardAPI:
              items:
                - path: namespace
                  fieldRef:
                    fieldPath: metadata.namespace
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

# -- Default values for rhdh-must-gather.
# -- This is a YAML-formatted file.
# -- Declare variables to be passed into your templates.

# -- Container image configuration
image:
  registry: quay.io
  repository: rhdh-community/rhdh-must-gather
  pullPolicy: ""
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: "latest"
  # -- Image digest (e.g., sha256:abc123...). Can be used with or without tag.
  digest: ""

# -- Secrets for pulling images from a private registry
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Expiration (in seconds) for the bound service account token projected
  # -- into the gather init container (minimum 600).
  tokenExpirationSeconds: 3600
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # -- If not set, a name is generated using the fullname template.
  name: ""

# -- RBAC configuration
rbac:
  # -- Create RBAC resources (Role/ClusterRole and bindings)
  create: true
  # -- Scope of the RBAC role: "cluster" creates a ClusterRole with cluster-wide read access;
  # -- "namespace" creates a namespace-scoped Role (the release namespace is always included
  # -- in --namespaces automatically, alongside any extra namespaces in gather.namespaces)
  scope: cluster

# -- Deployment strategy
strategy:
  type: Recreate

# -- Gather script configuration
gather:
  # -- Log level: info, INFO, debug, DEBUG, trace, TRACE
  logLevel: "info"
  # -- Command timeout for individual kubectl/helm commands (seconds)
  cmdTimeout: "30"
  # -- Relative time for log collection (e.g., "2h", "30m")
  since: ""
  # -- Absolute timestamp for log collection (RFC3339 format)
  sinceTime: ""

  # -- Optional collection features (disabled by default)
  withSecrets: false
  withHeapDumps: false
  clusterInfo: false

  # -- Exclusion options (set to true to skip collection)
  withoutOperator: false
  withoutOrchestrator: false
  withoutHelm: false
  withoutPlatform: false
  withoutRoute: false
  withoutIngress: false
  withoutNamespaceInspect: false

  # -- Limit collection to specific namespaces
  # -- Example: ["rhdh-prod", "rhdh-staging"]
  namespaces: []

  # -- Additional custom arguments to pass to the gather script
  extraArgs: []

# -- Resource requests and limits for the gather container
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
    ephemeral-storage: "64Mi"
  limits:
    memory: "512Mi"
    cpu: "500m"
    ephemeral-storage: "128Mi"

# -- Persistent volume configuration for storing gathered data
persistence:
  # -- Storage size
  size: 1Gi
  # -- Storage class (empty = use cluster default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce

# -- Data holder container configuration
# -- Runs alongside the gather container and stays alive so you can exec in and retrieve the output.
dataHolder:
  # -- Resource requests and limits for the data-holder container
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
      ephemeral-storage: "32Mi"
    limits:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "64Mi"

# -- Helm test configuration
test:
  # -- Enable the Helm test
  enabled: true
  # -- Image for the test pod
  image:
    registry: docker.io
    repository: bitnami/kubectl
    tag: "latest"
    digest: ""
    pullPolicy: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
# -- On OCP, the SCC may override fsGroup with a value from the namespace's allowed range.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

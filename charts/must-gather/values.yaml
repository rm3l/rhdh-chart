# -- Default values for rhdh-must-gather.
# -- This is a YAML-formatted file.
# -- Declare variables to be passed into your templates.

# -- Container image configuration
image:
  repository: quay.io/rhdh-community/rhdh-must-gather
  pullPolicy: ""
  # -- -- Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

# -- Secrets for pulling images from a private registry
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  # -- If not set and create is true, a name is generated using the fullname template
  name: ""

# -- RBAC configuration
rbac:
  # -- Create ClusterRole and ClusterRoleBinding for cluster-wide read access
  create: true

# -- Job configuration
job:
  # -- Job timeout in seconds (default: 1 hour)
  activeDeadlineSeconds: 3600
  # -- Number of retries before marking job as failed
  backoffLimit: 3
  # -- TTL for automatic cleanup after job finishes (seconds)
  ttlSecondsAfterFinished: 600

# -- Gather script configuration
gather:
  # -- Log level: info, debug, trace
  logLevel: "info"
  # -- Command timeout for individual kubectl/helm commands (seconds)
  cmdTimeout: "30"
  # -- Relative time for log collection (e.g., "2h", "30m")
  since: ""
  # -- Absolute timestamp for log collection (RFC3339 format)
  sinceTime: ""

  # -- Optional collection features (disabled by default)
  withSecrets: false
  withHeapDumps: false
  clusterInfo: false

  # -- Exclusion options (set to true to skip collection)
  withoutOperator: false
  withoutOrchestrator: false
  withoutHelm: false
  withoutPlatform: false
  withoutRoute: false
  withoutIngress: false
  withoutNamespaceInspect: false

  # -- Limit collection to specific namespaces (comma-separated)
  # -- Example: "rhdh-prod,rhdh-staging"
  namespaces: ""

  # -- Additional custom arguments to pass to the gather script
  extraArgs: []

# -- Resource requests and limits for the gather job
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
    ephemeral-storage: "64Mi"
  limits:
    memory: "512Mi"
    cpu: "500m"
    ephemeral-storage: "128Mi"

# -- Persistent volume configuration for storing gathered data
persistence:
  # -- Storage size
  size: 1Gi
  # -- Storage class (empty = use cluster default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce

# -- Data retriever pod configuration
# -- This pod allows you to retrieve the gathered data after the job completes
dataRetriever:
  # -- Enable the data retriever pod
  enabled: true
  # -- Image for the data retriever pod
  image:
    repository: registry.access.redhat.com/ubi9
    tag: "latest"
    pullPolicy: ""
  # -- Resource configuration
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
      ephemeral-storage: "32Mi"
    limits:
      memory: "128Mi"
      cpu: "100m"
      ephemeral-storage: "64Mi"

# -- Helm test configuration
test:
  # -- Enable the Helm test
  enabled: true
  # -- Image for the test pod
  image:
    repository: bitnami/kubectl
    tag: "latest"
    pullPolicy: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext: {}
  # -- fsGroup: 2000

# -- Container security context
securityContext: {}
  # -- capabilities:
  # --   drop:
  # --   - ALL
  # -- readOnlyRootFilesystem: true
  # -- runAsNonRoot: true
  # -- runAsUser: 1000

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

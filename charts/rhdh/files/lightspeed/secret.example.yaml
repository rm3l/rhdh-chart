# This file is a reference template — it is NOT deployed by the chart.
#
# Use it as a starting point to create your own Kubernetes Secret for the
# Lightspeed inference providers. Only include the keys for the providers
# you intend to use.
#
# Example:
#   kubectl create secret generic my-lightspeed-secret \
#     --from-env-file=<(grep -v '^#' secret.example.yaml | grep -v '^$')
#
# Then set in your values override:
#   lightspeed:
#     existingSecretRef: "my-lightspeed-secret"


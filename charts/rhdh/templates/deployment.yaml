{{- $installDir := "/opt/app-root/src" -}}
{{- $lightspeed := include "rhdh.lightspeed" . | fromYaml -}}
{{- $extraCatalogImages := include "rhdh.catalogIndex.extraImagesEnvValue" . | trim -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rhdh.fullname" . }}
  labels:
    {{- include "rhdh.labels" . | nindent 4 }}
  {{- if or .Values.commonAnnotations .Values.deploymentAnnotations }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
    {{- with .Values.deploymentAnnotations }}
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- with .Values.strategy }}
  strategy:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rhdh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rhdh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      annotations:
        checksum/app-config: {{ include "common.tplvalues.render" (dict "value" .Values.appConfig "context" $) | sha256sum }}
        checksum/dynamic-plugins: {{ include "common.tplvalues.render" (dict "value" (dict "dynamicPlugins" .Values.dynamicPlugins "lightspeed" (dict "enabled" $lightspeed.enabled "plugins" $lightspeed.plugins)) "context" $) | sha256sum }}
        {{- if $lightspeed.enabled }}
        checksum/lightspeed-config: {{ toJson $lightspeed.config | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "rhdh.serviceAccountName" . }}
      {{- include "rhdh.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      volumes:
        # --- System volumes (hardcoded, never replaced) ---
        - name: dynamic-plugins-root
          {{- if eq .Values.dynamicPlugins.volume.type "emptyDir" }}
          emptyDir:
            {{- include "common.tplvalues.render" (dict "value" .Values.dynamicPlugins.volume.emptyDir "context" $) | nindent 12 }}
          {{- else if eq .Values.dynamicPlugins.volume.type "pvc" }}
          persistentVolumeClaim:
            {{- include "common.tplvalues.render" (dict "value" .Values.dynamicPlugins.volume.pvc "context" $) | nindent 12 }}
          {{- else }}
          ephemeral:
            {{- include "common.tplvalues.render" (dict "value" .Values.dynamicPlugins.volume.ephemeral "context" $) | nindent 12 }}
          {{- end }}
        - name: dynamic-plugins
          configMap:
            defaultMode: 420
            name: {{ printf "%s-dynamic-plugins" (include "rhdh.fullname" .) }}
            optional: true
        - name: dynamic-plugins-npmrc
          secret:
            defaultMode: 420
            optional: true
            secretName: {{ printf "%s-dynamic-plugins-npmrc" (include "rhdh.fullname" .) }}
        - name: dynamic-plugins-registry-auth
          secret:
            defaultMode: 416
            optional: true
            secretName: {{ printf "%s-dynamic-plugins-registry-auth" (include "rhdh.fullname" .) }}
        - name: npmcacache
          emptyDir: {}
        - name: extensions-catalog
          emptyDir: {}
        - name: temp
          emptyDir: {}
        {{- if .Values.appConfig }}
        - name: backstage-app-config
          configMap:
            name: {{ include "rhdh.fullname" . }}-app-config
        {{- end }}
        {{- range .Values.extraAppConfig }}
        - name: {{ .configMapRef }}
          configMap:
            name: {{ .configMapRef }}
        {{- end }}
        {{- if $lightspeed.enabled }}
        - name: lightspeed-data
          {{- if eq $lightspeed.runtimeVolume.type "persistentVolumeClaim" }}
          persistentVolumeClaim:
            {{- include "common.tplvalues.render" (dict "value" $lightspeed.runtimeVolume.persistentVolumeClaim "context" $) | nindent 12 }}
          {{- else }}
          emptyDir:
            {{- include "common.tplvalues.render" (dict "value" $lightspeed.runtimeVolume.emptyDir "context" $) | nindent 12 }}
          {{- end }}
        - name: lightspeed-rag
          emptyDir: {}
        {{- range $key := list "stack" "server" "profile" }}
        {{- $entry := index $lightspeed.config $key }}
        {{- $cmKey := include "rhdh.lightspeed.configMapKey" (dict "key" $key "entry" $entry) }}
        - name: {{ printf "lightspeed-config-%s" $key }}
          configMap:
            name: {{ include "rhdh.lightspeed.configMapName" (dict "root" $ "key" $key "entry" $entry) }}
            items:
              - key: {{ $cmKey | quote }}
                path: {{ $cmKey | quote }}
        {{- end }}
        {{- end }}
        # --- User-additional volumes (appended) ---
        {{- with .Values.extraVolumes }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      initContainers:
        # --- User pre-init containers (run before system init containers) ---
        {{- with .Values.preInitContainers }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
        # --- System init containers (hardcoded) ---
        - name: install-dynamic-plugins
          image: {{ include "rhdh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with (.Values.dynamicPlugins.initContainer.securityContext | default .Values.containerSecurityContext) }}
          securityContext:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.dynamicPlugins.initContainer.commandOverride }}
          command:
            {{- include "common.tplvalues.render" (dict "value" .Values.dynamicPlugins.initContainer.commandOverride "context" $) | nindent 12 }}
          {{- else }}
          command:
            - ./install-dynamic-plugins.sh
            - /dynamic-plugins-root
          {{- end }}
          {{- if .Values.dynamicPlugins.initContainer.argsOverride }}
          args:
            {{- include "common.tplvalues.render" (dict "value" .Values.dynamicPlugins.initContainer.argsOverride "context" $) | nindent 12 }}
          {{- else if .Values.dynamicPlugins.initContainer.extraArgs }}
          args:
            {{- range .Values.dynamicPlugins.initContainer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          env:
            - name: NPM_CONFIG_USERCONFIG
              value: /opt/app-root/src/.npmrc.dynamic-plugins
            - name: MAX_ENTRY_SIZE
              value: "40000000"
            - name: CATALOG_INDEX_IMAGE
              value: {{ include "rhdh.image.render" (dict "image" .Values.catalogIndex.image "global" .Values.global) | quote }}
            - name: CATALOG_ENTITIES_EXTRACT_DIR
              value: /extensions
            {{- if $extraCatalogImages }}
            - name: EXTRA_CATALOG_INDEX_IMAGES
              value: {{ $extraCatalogImages | quote }}
            {{- end }}
            {{- with .Values.dynamicPlugins.initContainer.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          {{- with .Values.dynamicPlugins.initContainer.resources }}
          resources:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /dynamic-plugins-root
              name: dynamic-plugins-root
            - mountPath: /opt/app-root/src/dynamic-plugins.yaml
              name: dynamic-plugins
              readOnly: true
              subPath: dynamic-plugins.yaml
            - mountPath: /opt/app-root/src/.npmrc.dynamic-plugins
              name: dynamic-plugins-npmrc
              readOnly: true
              subPath: .npmrc
            - mountPath: /opt/app-root/src/.config/containers
              name: dynamic-plugins-registry-auth
              readOnly: true
            - mountPath: /opt/app-root/src/.npm/_cacache
              name: npmcacache
            - name: extensions-catalog
              mountPath: /extensions
            - name: temp
              mountPath: /tmp
            {{- with .Values.dynamicPlugins.initContainer.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          workingDir: /opt/app-root/src
        {{- if $lightspeed.enabled }}
        - name: lightspeed-rag-init
          image: {{ include "rhdh.image.render" (dict "image" $lightspeed.ragInit.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ $lightspeed.ragInit.imagePullPolicy | quote }}
          {{- with $lightspeed.ragInit.securityContext }}
          securityContext:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- if $lightspeed.ragInit.commandOverride }}
          command:
            {{- include "common.tplvalues.render" (dict "value" $lightspeed.ragInit.commandOverride "context" $) | nindent 12 }}
          {{- else }}
          command: ["sh", "-c"]
          {{- end }}
          {{- if $lightspeed.ragInit.argsOverride }}
          args:
            {{- include "common.tplvalues.render" (dict "value" $lightspeed.ragInit.argsOverride "context" $) | nindent 12 }}
          {{- else }}
          args:
            - >-
              mkdir -p /tmp/data &&
              echo 'Copying Lightspeed RAG data...' &&
              cp -r --no-preserve=mode,ownership /rag/vector_db /rag-content/ &&
              cp -r --no-preserve=mode,ownership /rag/embeddings_model /rag-content/ &&
              mkdir -p /rag-content/vector_db/notebooks &&
              chmod -R a+rwX /rag-content/embeddings_model /rag-content/vector_db &&
              echo 'Copy complete.'
            {{- range $lightspeed.ragInit.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- with $lightspeed.ragInit.extraEnv }}
          env:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with $lightspeed.ragInit.resources }}
          resources:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: lightspeed-data
              mountPath: "/tmp"
            - name: lightspeed-rag
              mountPath: "/rag-content"
            {{- with $lightspeed.ragInit.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
        {{- end }}
        # --- User-additional init containers (appended) ---
        {{- with .Values.extraInitContainers }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      containers:
        - name: backstage-backend
          image: {{ include "rhdh.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.commandOverride }}
          command:
            {{- include "common.tplvalues.render" (dict "value" .Values.commandOverride "context" $) | nindent 12 }}
          {{- end }}
          args:
            {{- if .Values.argsOverride }}
            {{- range .Values.argsOverride }}
            - {{ . | quote }}
            {{- end }}
            {{- else }}
            - "--config"
            - "{{ $installDir }}/dynamic-plugins-root/app-config.dynamic-plugins.yaml"
            {{- if .Values.appConfig }}
            - "--config"
            - "{{ $installDir }}/app-config-from-configmap.yaml"
            {{- end }}
            {{- range .Values.extraAppConfig }}
            - "--config"
            - "{{ $installDir }}/{{ .filename }}"
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- if or .Values.envFromOverride .Values.extraEnvFrom }}
          envFrom:
            {{- if .Values.envFromOverride }}
            {{- include "common.tplvalues.render" (dict "value" .Values.envFromOverride "context" $) | nindent 12 }}
            {{- else }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvFrom "context" $) | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            {{- if .Values.envOverride }}
            {{- include "common.tplvalues.render" (dict "value" .Values.envOverride "context" $) | nindent 12 }}
            {{- else }}
            # --- System env vars (hardcoded) ---
            - name: APP_CONFIG_backend_listen_port
              value: {{ .Values.service.port | quote }}
            {{- if .Values.auth.backend.enabled }}
            - name: BACKEND_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "rhdh.backend-secret-name" . }}
                  key: {{ include "rhdh.backend-secret-key" . }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_HOST
              value: {{ include "rhdh.postgresql.host" . }}
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | default "postgres" }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rhdh.postgresql.secretName" . }}
                  key: {{ include "rhdh.postgresql.adminPasswordKey" . }}
            {{- end }}
            # --- User-additional env vars (appended) ---
            {{- with .Values.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
            {{- end }}
          ports:
            - name: backend
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            # --- System volume mounts (hardcoded) ---
            - mountPath: {{ $installDir }}/dynamic-plugins-root
              name: dynamic-plugins-root
            - name: extensions-catalog
              mountPath: /extensions
            - name: temp
              mountPath: /tmp
            {{- if .Values.appConfig }}
            - name: backstage-app-config
              mountPath: "{{ $installDir }}/app-config-from-configmap.yaml"
              subPath: app-config.yaml
            {{- end }}
            {{- range .Values.extraAppConfig }}
            - name: {{ .configMapRef }}
              mountPath: "{{ $installDir }}/{{ .filename }}"
              subPath: {{ .filename }}
            {{- end }}
            # --- User-additional volume mounts (appended) ---
            {{- with .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
        {{- if $lightspeed.enabled }}
        - name: lightspeed-core
          image: {{ include "rhdh.image.render" (dict "image" $lightspeed.core.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ $lightspeed.core.imagePullPolicy | quote }}
          {{- with $lightspeed.core.securityContext }}
          securityContext:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with $lightspeed.core.commandOverride }}
          command:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- if $lightspeed.core.argsOverride }}
          args:
            {{- include "common.tplvalues.render" (dict "value" $lightspeed.core.argsOverride "context" $) | nindent 12 }}
          {{- else if $lightspeed.core.extraArgs }}
          args:
            {{- range $lightspeed.core.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http-lightspeed
              containerPort: 8080
              protocol: TCP
          {{- if $lightspeed.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ $lightspeed.existingSecret }}
          {{- end }}
          {{- with $lightspeed.core.extraEnv }}
          env:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          {{- with $lightspeed.core.resources }}
          resources:
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: lightspeed-data
              mountPath: "/tmp"
            - name: lightspeed-rag
              mountPath: "/rag-content"
            {{- range $key := list "stack" "server" "profile" }}
            {{- $entry := index $lightspeed.config $key }}
            {{- $file := include "rhdh.lightspeed.configFile" $key }}
            {{- $cmKey := include "rhdh.lightspeed.configMapKey" (dict "key" $key "entry" $entry) }}
            - name: {{ printf "lightspeed-config-%s" $key }}
              mountPath: {{ printf "/app-root/%s" $file | quote }}
              subPath: {{ $cmKey | quote }}
              readOnly: true
            {{- end }}
            {{- with $lightspeed.core.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
        {{- end }}
        # --- User-additional sidecar containers (appended) ---
        {{- with .Values.extraContainers }}
        {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}

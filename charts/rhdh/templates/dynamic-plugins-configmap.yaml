apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-dynamic-plugins" (include "rhdh.fullname" .) }}
  labels:
    {{- include "rhdh.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
data:
  dynamic-plugins.yaml: |
    {{- $lightspeed := include "rhdh.lightspeed" . | fromYaml }}
    {{- $dynamic := dict "includes" .Values.dynamicPlugins.includes }}
    {{- $plugins := list }}

    {{- range .Values.dynamicPlugins.plugins }}
      {{- $plugins = append $plugins . }}
    {{- end }}

    {{- if .Values.orchestrator.enabled }}
      {{- range .Values.orchestrator.plugins }}
        {{- $plugins = append $plugins . }}
      {{- end }}
    {{- end }}

    {{- if $lightspeed.enabled }}
      {{- range $lightspeed.plugins }}
        {{- $plugins = append $plugins . }}
      {{- end }}
    {{- end }}

    {{- $_ := set $dynamic "plugins" $plugins }}

    {{- include "common.tplvalues.render" (dict "value" $dynamic "context" $) | nindent 4 }}

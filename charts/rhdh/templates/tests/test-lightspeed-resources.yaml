{{- if and .Values.test.enabled .Values.test.injectTestLightspeedResources }}
{{- $configFiles := dict "stack" "lightspeed-stack.yaml" "server" "config.yaml" "profile" "rhdh-profile.py" }}
{{- range $key, $file := $configFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-lightspeed-{{ $key }}
  labels:
    {{- include "rhdh.labels" $ | nindent 4 }}
  annotations:
    {{- with $.Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
data:
  {{ $file }}: |
{{ $.Files.Get (printf "files/lightspeed/%s" $file) | nindent 4 }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: test-lightspeed-secret
  labels:
    {{- include "rhdh.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
stringData:
  LLAMA_STACK_LOGGING: "info"
{{- end }}

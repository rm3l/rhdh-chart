{{- if and .Values.test.enabled .Values.test.injectTestNpmrcSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-dynamic-plugins-npmrc" (include "rhdh.fullname" .) }}
  labels:
    {{- include "rhdh.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
immutable: true
stringData:
  .npmrc: |
    @myscope:registry=https://my-registry.example.com
    //my-registry.example.com:_authToken=foo
{{- end }}
